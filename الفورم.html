<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تأكيد الطلب المتكامل</title>
    <!-- استيراد خط Cairo بوزن 900 (الأثخن) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap" rel="stylesheet">
    <style>
        /* الثيم الموحد مع أنيميشن كامل لجميع العناصر */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        
        body{
            /* خط Cairo بوزن 900 (أعرض بكثير) */
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(145deg, #0d0d0d, #1a1a1a);
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            margin:0;
            padding:10px 0;
        }
        .container{
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding:3px 8px 5px 8px;
            border-radius:20px;
            width:300px;
            box-shadow:0 0 25px rgba(0,0,0,0.5);
            border:1px solid rgba(255,255,255,0.15);
            transition: transform 0.3s ease;
        }
        .container:hover{ transform: scale(1.02); }
        h2{ 
            text-align:center; 
            margin-top: 0px;
            margin-bottom:5px; 
            font-size:18px;
            color:#fff; 
            font-weight: 900;
            letter-spacing: -0.3px;
            font-family: 'Cairo', sans-serif;
        }

        /* شبكة الحقول الأساسية */
        .form-grid{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 5px;
            margin-bottom: 2px;
            direction: rtl;
        }
        /* تصميم موحد لجميع حقول الإدخال (ما عدا التفاصيل) */
        .form-grid input,
        .form-grid textarea:not(.large-detail),
        .sizes-grid input,
        .sizes-grid textarea:not(.large-detail) {
            width:100%;
            padding:6px 6px;      
            margin:0;
            border:none;
            border-radius:8px;     
            background: rgba(255,255,255,0.1);
            color:#fff;
            font-size:10px;        /* حجم النص كما هو */
            font-weight: 900;      /* أثخن وزن */
            letter-spacing: -0.1px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            direction: rtl;
            text-align: right;
            resize: none;
            line-height: 1.4;       
            overflow: hidden;
            -webkit-appearance: none;
            appearance: none;
            font-family: 'Cairo', sans-serif;
            -webkit-font-smoothing: antialiased;
            height: 42px;
        }

        /* استثناء لحقل "رقم الثوب" - إزالة padding الجانبي بالكامل مع مسافة بادئة بسيطة */
        input[name="form_number"] {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: -0.1px;
            padding: 5px 0px 5px 0px; /* padding أفقي صفر */
            line-height: 1.5;
            height: 42px;
            font-family: 'Cairo', sans-serif;
            text-indent: 2px; /* مسافة بادئة بسيطة */
        }

        /* خانتا التفاصيل (ارتفاع 44px) */
        textarea.large-detail {
            width:100%;
            padding:8px 8px;
            margin:0;
            border:none;
            border-radius:8px;
            background: rgba(255,255,255,0.1);
            color:#fff;
            font-size:10px;           /* نفس حجم النص */
            font-weight: 900;
            letter-spacing: -0.1px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            direction: rtl;
            text-align: right;
            line-height: 1.5;
            font-family: 'Cairo', sans-serif;
            -webkit-font-smoothing: antialiased;
            resize: none;
            overflow: hidden;
            height: 44px;
            min-height: 44px;
            max-height: 44px;
        }

        /* تأثير focus الموحد لجميع الحقول ما عدا التفاصيل (تكبير عادي 1.05) */
        .form-grid input:focus,
        .form-grid textarea:not(.large-detail):focus,
        .sizes-grid input:focus,
        .sizes-grid textarea:not(.large-detail):focus {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            outline: none;
        }

        /* تأثير focus خاص لخانتي التفاصيل - تكبير أقل (1.02) */
        textarea.large-detail:focus {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);  /* تقليل التكبير */
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            outline: none;
        }

        /* إخفاء أزرار السبين للأرقام */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }

        /* عنوان كم مقاسك؟ */
        .sizes-title{ 
            margin-top: 8px;
            margin-bottom: 6px; 
            font-size:12px;        
            font-weight: 900; 
            text-align:center; 
            color: #fff;
            letter-spacing: -0.2px;
            font-family: 'Cairo', sans-serif;
        }
        
        /* شبكة المقاسات */
        .sizes-grid{ 
            display:grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 4px 5px;
            margin-top: 0px;
            margin-bottom: 6px;
            direction: rtl;
        }
        /* الحقل الثالث (تفاصيل القياس) سيمتد على عمودين */
        .full-width {
            grid-column: span 2;
        }

        .buttons{ display:flex; justify-content:space-between; margin-top: 10px; }
        button{
            width:48%;
            padding:6px 8px;
            border:none; 
            border-radius:8px;   
            cursor:pointer; 
            font-size:14px;
            font-weight: 900;     
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
            font-family: 'Cairo', sans-serif;
            letter-spacing: -0.1px;
        }
        button:hover{ transform: scale(1.08); box-shadow:0 0 15px rgba(255,255,255,0.3); }
        .confirm{ background:#28a745; color:#fff; }
        .cancel{ background:#dc3545; color:#fff; }
        
        /* تحسين للأيفون */
        @supports (-webkit-touch-callout: none) {
            .container {
                width: 290px;
                padding: 3px 8px 5px 8px;
            }
            input, textarea, button {
                font-size: 11px !important;
            }
            textarea.large-detail {
                font-size: 11px !important;
                height: 44px;
                min-height: 44px;
                max-height: 44px;
            }
            button {
                font-size: 15px !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>بيانات الطلب</h2>
        <form id="orderForm">
            <!-- شبكة الحقول الأساسية مع الترتيب الجديد -->
            <div class="form-grid">
                <!-- العمود الأيمن (يظهر أولاً) -->
                <input type="text" name="name" placeholder="الاسم" required>
                <input type="tel" name="phone" placeholder="رقم هاتف آخر" required inputmode="numeric" pattern="\d*">
                <input type="tel" name="alternate_phone" placeholder="رقم الهاتف" inputmode="numeric" pattern="\d*">
                
                <!-- العمود الأيسر (يظهر ثانياً) -->
                <input type="tel" name="quantity" placeholder="كم ثوب تريد؟" required inputmode="numeric" pattern="\d*">
                <input type="text" name="governorate" placeholder="المحافظة" required>
                <input type="tel" name="form_number" placeholder="رقم الثوب الذي تريدة؟" required inputmode="numeric" pattern="\d*">
                
                <!-- تفاصيل العنوان (مكبرة قليلاً) - تمتد على عمودين -->
                <textarea name="details" placeholder="تفاصيل اخري للعنوان" class="full-width large-detail" style="grid-column: span 2;"></textarea>
            </div>

            <!-- عنوان كم مقاسك؟ -->
            <div class="sizes-title">كم مقاسك ؟</div>

            <!-- شبكة القياسات مع الترتيب الجديد -->
            <div class="sizes-grid">
                <!-- العمود الأيمن (الطول) -->
                <input type="tel" name="length_cm" placeholder="الطول" inputmode="numeric" pattern="\d*">
                
                <!-- العمود الأيسر (الوزن) -->
                <input type="tel" name="width" placeholder="الوزن" inputmode="numeric" pattern="\d*">
                
                <!-- تفاصيل القياس (تم تعديل النص) -->
                <textarea name="extra_measure_details" placeholder="تفاصيل اخري بالنسبة للمقاس .. بطن . بايسبس الخ...." class="full-width large-detail" style="grid-column: span 2;"></textarea>
            </div>

            <input type="hidden" name="model_image" value="diagram-clean.png">

            <div class="buttons">
                <button type="button" class="cancel" id="cancelBtn">إلغاء الطلب</button>
                <button type="submit" class="confirm">تأكيد الطلب</button>
            </div>
        </form>
    </div>

    <script>
        (function() {
            // معالجة تقديم النموذج مع الحقول المتبقية فقط
            document.getElementById("orderForm").addEventListener("submit", function(event) {
                event.preventDefault();

                const formData = new FormData(this);
                let body = "تفاصيل الطلب:\n\n" +
                    "الاسم: " + (formData.get("name") || "") + "\n" +
                    "رقم هاتف آخر: " + (formData.get("phone") || "") + "\n" +
                    "رقم الهاتف: " + (formData.get("alternate_phone") || "") + "\n" +
                    "كم ثوب تريد؟: " + (formData.get("quantity") || "") + "\n" +
                    "المحافظة: " + (formData.get("governorate") || "") + "\n" +
                    "رقم الثوب الذي تريدة؟: " + (formData.get("form_number") || "") + "\n" +
                    "تفاصيل اخري للعنوان: " + (formData.get("details") || "") + "\n" +
                    "الطول: " + (formData.get("length_cm") || "") + "\n" +
                    "الوزن: " + (formData.get("width") || "") + "\n" +
                    "تفاصيل اخري للمقاسات (كرش، بايسبس...): " + (formData.get("extra_measure_details") || "");

                let encodedMessage = encodeURIComponent(body);
                let isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                           (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

                if (isIOS) {
                    window.location.href = "https://wa.me/201061720462?text=" + encodedMessage;
                    setTimeout(() => {
                        if (window.history.length > 1) {
                            window.history.back();
                        } else {
                            window.close();
                        }
                    }, 2000);
                } else {
                    if (navigator.userAgent.toLowerCase().includes("windows") || 
                        navigator.userAgent.toLowerCase().includes("mac")) {
                        window.open("https://mail.google.com/mail/?view=cm&fs=1&to=" 
                            + encodeURIComponent("elansarialansary@gmail.com") 
                            + "&su=" + encodeURIComponent("طلب جديد من الموقع") 
                            + "&body=" + encodedMessage, "_blank");
                    } else {
                        window.open("https://wa.me/201061720462?text=" + encodedMessage, "_blank");
                    }
                    setTimeout(() => { window.close(); }, 1500);
                }
            });

            // زر الإلغاء
            document.getElementById("cancelBtn").addEventListener("click", function() {
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    window.close();
                }
            });

        })();
    </script>
</body>
</html>
