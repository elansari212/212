<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تأكيد الطلب المتكامل</title>
    <style>
        /* الثيم الموحد مع أنيميشن كامل لجميع العناصر */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }
        
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(145deg, #0d0d0d, #1a1a1a);
            color:#fff;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            margin:0;
            padding:10px 0;
        }
        .container{
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding:3px 25px 5px 25px;
            border-radius:20px;
            width:270px;
            box-shadow:0 0 25px rgba(0,0,0,0.5);
            border:1px solid rgba(255,255,255,0.15);
            transition: transform 0.3s ease;
        }
        .container:hover{ transform: scale(1.02); }
        h2{ 
            text-align:center; 
            margin-top: 0px;
            margin-bottom:5px; 
            font-size:17px;
            color:#fff; 
            font-weight: bold;
        }

        /* شبكة الحقول الأساسية (8 حقول) */
        .form-grid{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px 8px;
            margin-bottom: 2px;
        }
        /* تصميم موحد لجميع حقول الإدخال مع أنيميشن */
        .form-grid input,
        .form-grid textarea,
        .sizes-grid input {
            width:100%;
            padding:5px 8px;
            margin:0;
            border:none;
            border-radius:8px;
            background: rgba(255,255,255,0.1);
            color:#fff;
            font-size:14px;
            font-weight:500;
            letter-spacing:0.5px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            direction: rtl;
            text-align: right;
            height: 30px;
            resize: none;
            line-height: 1.4;
            overflow: hidden;
            -webkit-appearance: none;
            appearance: none;
        }

        /* استثناء لحقل "رقم الثوب" */
        input[name="form_number"] {
            font-size: 14px;
            letter-spacing: normal;
            padding: 2px 8px;
            line-height: 1.6;
        }

        /* استثناء لباقي الحقول الطويلة */
        input[name="biceps_circumference"],
        textarea[name="details"] {
            font-size: 12px;
            letter-spacing: normal;
        }

        /* تأثير focus الموحد */
        .form-grid input:focus,
        .form-grid textarea:focus,
        .sizes-grid input:focus {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            outline: none;
            height: 30px;
        }

        /* إخفاء أزرار السبين للأرقام */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] { -moz-appearance: textfield; }

        /* الصورة */
        .model-preview{
            display:block;
            margin:0 auto 4px auto;
            border-radius:12px;
            border:1px solid rgba(255,255,255,0.3);
            cursor: pointer;
            max-width:100%;
            height:auto;
            transform-origin: bottom center;
            -webkit-user-select: none;
            user-select: none;
            pointer-events: none;
            transition: transform 0.1s ease;
        }
        
        /* تنسيقات شريط التكبير */
        .zoom-control {
            margin: 2px 0 14px 0;
            text-align: center;
            direction: rtl;
            min-height: 22px;
        }
        .zoom-label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 3px;
            color: #fff;
        }

        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            outline: none;
            direction: ltr;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
            transition: all 0.2s ease;
            border: none;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            background: #28a745;
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.5);
        }

        input[type=range]::-webkit-slider-thumb:active {
            background: #1e7e34;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        input[type=range]::-moz-range-thumb {
            width: 24px;
            height: 24px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
            transition: all 0.2s ease;
            border: none;
        }

        input[type=range]::-moz-range-thumb:hover {
            background: #28a745;
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(40, 167, 69, 0.5);
        }

        .sizes-title{ 
            margin-top: 8px;
            margin-bottom: 1px; 
            font-size:14px; 
            font-weight:bold; 
            text-align:center; 
        }
        
        /* شبكة المقاسات */
        .sizes-grid{ 
            display:grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 6px 8px;
            margin-top: 0px;
            margin-bottom: 6px;
        }

        .buttons{ display:flex; justify-content:space-between; margin-top: 2px; }
        button{
            width:48%; 
            padding:6px 12px;
            border:none; 
            border-radius:10px;
            cursor:pointer; 
            font-size:15px;
            font-weight:bold; 
            transition: all 0.3s ease;
            -webkit-appearance: none;
            appearance: none;
        }
        button:hover{ transform: scale(1.08); box-shadow:0 0 15px rgba(255,255,255,0.3); }
        .confirm{ background:#28a745; color:#fff; }
        .cancel{ background:#dc3545; color:#fff; }
        
        /* تحسين للأيفون */
        @supports (-webkit-touch-callout: none) {
            .container {
                width: 260px;
                padding: 3px 20px 5px 20px;
            }
            input, textarea, button {
                font-size: 16px !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>بيانات الطلب</h2>
        <form id="orderForm">
            <!-- شبكة الحقول الأساسية (8 حقول) -->
            <div class="form-grid">
                <!-- العمود الأيمن -->
                <input type="text" name="country" placeholder="الدولة" required>
                <input type="text" name="name" placeholder="الاسم" required>

                <!-- الأرقام فقط -->
                <input type="number" name="quantity" placeholder="كم ثوب" required min="1" step="1" onkeypress="return (event.charCode >= 48 && event.charCode <= 57)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" pattern="\d*" inputmode="numeric">
                <input type="text" name="governorate" placeholder="المحافظة" required>

                <!-- الأرقام فقط -->
                <input type="tel" name="phone" placeholder="رقم هاتف آخر" required onkeypress="return (event.charCode >= 48 && event.charCode <= 57)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" pattern="\d*" inputmode="numeric">
                <textarea name="details" placeholder="تفاصيل العنوان"></textarea>

                <!-- الأرقام فقط -->
                <input type="text" name="form_number" placeholder="رقم الثوب" required onkeypress="return (event.charCode >= 48 && event.charCode <= 57)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" pattern="\d*" inputmode="numeric">
                
                <!-- الأرقام فقط -->
                <input type="tel" name="alternate_phone" placeholder="رقم الهاتف" onkeypress="return (event.charCode >= 48 && event.charCode <= 57)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" pattern="\d*" inputmode="numeric">
            </div>

            <div class="sizes-title">(سم) طريقة القياس</div>
            <img src="WhatsApp Image 2026-03-04 at 12.46.55 PM.jpeg" class="model-preview" id="measureImage" alt="طريقة القياس">

            <!-- عنصر التحكم بالتكبير -->
            <div class="zoom-control">
                <span class="zoom-label" id="zoomLabel">تكبير الصور 🔍</span>
                <input type="range" id="zoomSlider" min="1" max="1.7" step="0.01" value="1">
            </div>

            <!-- شبكة المقاسات (6 حقول) - جميعها أرقام فقط -->
            <div class="sizes-grid">
                <!-- العمود الأيمن -->
                <input type="number" name="shoulder_width" placeholder="عرض الكتف" onkeypress="return (event.charCode >= 48 && event.charCode <= 57)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" pattern="\d*" inputmode="numeric">
                <input type="number" name="length_cm" placeholder="الطول" onkeypress="return (event.charCode >= 48 && event.charCode <= 57)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" pattern="\d*" inputmode="numeric">

                <input type="number" name="neck_circumference" placeholder="محيط الرقبة" onkeypress="return (event.charCode >= 48 && event.charCode <= 57)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" pattern="\d*" inputmode="numeric">
                <input type="number" name="arm_length" placeholder="طول الذراع" onkeypress="return (event.charCode >= 48 && event.charCode <= 57)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" pattern="\d*" inputmode="numeric">

                <input type="number" name="biceps_circumference" placeholder="محيط البايسبس" onkeypress="return (event.charCode >= 48 && event.charCode <= 57)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" pattern="\d*" inputmode="numeric">
                <input type="number" name="width" placeholder="العرض" onkeypress="return (event.charCode >= 48 && event.charCode <= 57)" oninput="this.value=this.value.replace(/[^0-9]/g,'')" pattern="\d*" inputmode="numeric">
            </div>

            <input type="hidden" name="model_image" value="diagram-clean.png">

            <div class="buttons">
                <button type="button" class="cancel" id="cancelBtn">إلغاء الطلب</button>
                <button type="submit" class="confirm">تأكيد الطلب</button>
            </div>
        </form>
    </div>

    <script>
        (function() {
            const img = document.getElementById("measureImage");
            const zoomSlider = document.getElementById("zoomSlider");
            const zoomLabel = document.getElementById("zoomLabel");

            if (!img || !zoomSlider || !zoomLabel) return;

            // تحديث تكبير الصورة عند تغيير الشريط
            zoomSlider.addEventListener("input", function() {
                const zoomValue = this.value;
                img.style.transform = `scale(${zoomValue})`;
                img.style.webkitTransform = `scale(${zoomValue})`;
                
                // التمرير للأعلى عند أقصى تكبير
                if (zoomValue >= 1.69) {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });

            // إظهار/إخفاء النص عند بدء/انتهاء التفاعل
            zoomSlider.addEventListener("touchstart", function() {
                zoomLabel.classList.add('hidden');
            });

            zoomSlider.addEventListener("touchend", function() {
                zoomLabel.classList.remove('hidden');
            });

            zoomSlider.addEventListener("mousedown", function() {
                zoomLabel.classList.add('hidden');
            });

            zoomSlider.addEventListener("mouseup", function() {
                zoomLabel.classList.add('hidden');
                setTimeout(() => {
                    zoomLabel.classList.remove('hidden');
                }, 100);
            });

            // معالجة تقديم النموذج
            document.getElementById("orderForm").addEventListener("submit", function(event) {
                event.preventDefault();

                const formData = new FormData(this);
                let body = "تفاصيل الطلب:\n\n" +
                    "الاسم: " + formData.get("name") + "\n" +
                    "الدولة: " + formData.get("country") + "\n" +
                    "المحافظة: " + formData.get("governorate") + "\n" +
                    "كم ثوب: " + formData.get("quantity") + "\n" +
                    "تفاصيل العنوان: " + formData.get("details") + "\n" +
                    "رقم هاتف آخر: " + formData.get("phone") + "\n" +
                    "رقم الهاتف: " + formData.get("alternate_phone") + "\n" +
                    "رقم الثوب: " + formData.get("form_number") + "\n" +
                    "عرض الكتف: " + formData.get("shoulder_width") + "\n" +
                    "محيط الرقبة: " + formData.get("neck_circumference") + "\n" +
                    "محيط البايسبس: " + formData.get("biceps_circumference") + "\n" +
                    "الطول: " + formData.get("length_cm") + "\n" +
                    "طول الذراع: " + formData.get("arm_length") + "\n" +
                    "العرض: " + formData.get("width");

                let encodedMessage = encodeURIComponent(body);
                let isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                           (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

                if (isIOS) {
                    window.location.href = "https://wa.me/201061720462?text=" + encodedMessage;
                    setTimeout(() => {
                        if (window.history.length > 1) {
                            window.history.back();
                        } else {
                            window.close();
                        }
                    }, 2000);
                } else {
                    if (navigator.userAgent.toLowerCase().includes("windows") || 
                        navigator.userAgent.toLowerCase().includes("mac")) {
                        window.open("https://mail.google.com/mail/?view=cm&fs=1&to=" 
                            + encodeURIComponent("elansarialansary@gmail.com") 
                            + "&su=" + encodeURIComponent("طلب جديد من الموقع") 
                            + "&body=" + encodedMessage, "_blank");
                    } else {
                        window.open("https://wa.me/201061720462?text=" + encodedMessage, "_blank");
                    }
                    setTimeout(() => { window.close(); }, 1500);
                }
            });

            // زر الإلغاء
            document.getElementById("cancelBtn").addEventListener("click", function() {
                if (window.history.length > 1) {
                    window.history.back();
                } else {
                    window.close();
                }
            });

        })();
    </script>
</body>
</html>
